<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1024" y2="1024" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2B254E"/>
      <stop offset="0.5" stop-color="#1E1E2E"/>
      <stop offset="1" stop-color="#14141F"/>
    </linearGradient>
    <linearGradient id="mic" x1="380" y1="180" x2="644" y2="620" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#D0D0E0"/>
    </linearGradient>
    <linearGradient id="glow" x1="512" y1="280" x2="512" y2="580" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#8D7CFF" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#7C6FE3" stop-opacity="0"/>
    </linearGradient>
    <filter id="shadow" x="0" y="0" width="1024" height="1024" filterUnits="userSpaceOnUse">
      <feDropShadow dx="0" dy="8" stdDeviation="20" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
    <filter id="mic-shadow" x="300" y="180" width="424" height="520" filterUnits="userSpaceOnUse">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- 圆角背景 -->
  <rect width="1024" height="1024" rx="220" ry="220" fill="url(#bg)"/>

  <!-- 背景光晕 -->
  <circle cx="512" cy="420" r="260" fill="url(#glow)"/>

  <!-- 麦克风主体 - 大尺寸居中 -->
  <g filter="url(#mic-shadow)" transform="translate(512, 380)">
    <!-- 麦克风头部（圆角矩形） -->
    <rect x="-72" y="-180" width="144" height="240" rx="72" ry="72" fill="url(#mic)"/>

    <!-- 麦克风网格线 -->
    <line x1="-50" y1="-100" x2="50" y2="-100" stroke="#B0B0C8" stroke-width="3" opacity="0.4"/>
    <line x1="-50" y1="-50" x2="50" y2="-50" stroke="#B0B0C8" stroke-width="3" opacity="0.4"/>
    <line x1="-50" y1="0" x2="50" y2="0" stroke="#B0B0C8" stroke-width="3" opacity="0.4"/>

    <!-- 麦克风支架弧线 -->
    <path d="M-90,20 A100,100 0 0,0 90,20" fill="none" stroke="white" stroke-width="18" stroke-linecap="round"/>

    <!-- 麦克风立柱 -->
    <line x1="0" y1="80" x2="0" y2="160" stroke="white" stroke-width="18" stroke-linecap="round"/>

    <!-- 麦克风底座 -->
    <line x1="-48" y1="160" x2="48" y2="160" stroke="white" stroke-width="18" stroke-linecap="round"/>
  </g>

  <!-- 左侧波形 -->
  <g transform="translate(512, 380)" fill="none" stroke="#4EC9B0" stroke-width="10" stroke-linecap="round" opacity="0.85">
    <line x1="-200" y1="-80" x2="-200" y2="80"/>
    <line x1="-240" y1="-120" x2="-240" y2="120"/>
    <line x1="-280" y1="-60" x2="-280" y2="60"/>
    <line x1="-320" y1="-100" x2="-320" y2="100"/>
    <line x1="-360" y1="-40" x2="-360" y2="40"/>
  </g>

  <!-- 右侧波形 -->
  <g transform="translate(512, 380)" fill="none" stroke="#7C6FE3" stroke-width="10" stroke-linecap="round" opacity="0.85">
    <line x1="200" y1="-80" x2="200" y2="80"/>
    <line x1="240" y1="-120" x2="240" y2="120"/>
    <line x1="280" y1="-60" x2="280" y2="60"/>
    <line x1="320" y1="-100" x2="320" y2="100"/>
    <line x1="360" y1="-40" x2="360" y2="40"/>
  </g>

  <!-- 底部文字行（表示转写输出） -->
  <g transform="translate(280, 700)">
    <rect x="0" y="0" width="464" height="14" rx="7" fill="#FFFFFF" opacity="0.9"/>
    <rect x="0" y="36" width="380" height="12" rx="6" fill="#A0A0B0" opacity="0.7"/>
    <rect x="0" y="66" width="300" height="12" rx="6" fill="#4EC9B0" opacity="0.6"/>
  </g>
</svg>
