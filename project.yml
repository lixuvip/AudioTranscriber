name: AudioTranscriber
options:
  bundleIdPrefix: com.audiotools
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGN_STYLE: Manual
    DEVELOPMENT_TEAM: ""

targets:
  AudioTranscriber:
    type: application
    platform: macOS
    sources:
      - path: Sources
        excludes:
          - "**/.DS_Store"
      - path: Scripts
        buildPhase: resources
        excludes:
          - "**/.DS_Store"
          - "**/__pycache__"
    resources:
      - path: Resources
        excludes:
          - "**/.DS_Store"
          - "AppIcon.svg"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.audiotools.transcriber
        INFOPLIST_FILE: Resources/Info.plist
        PRODUCT_NAME: AudioTranscriber
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        COMBINE_HIDPI_IMAGES: YES
        LD_RUNPATH_SEARCH_PATHS: "@executable_path/../Frameworks"
        SWIFT_EMIT_LOC_STRINGS: YES
        ENABLE_HARDENED_RUNTIME: NO
